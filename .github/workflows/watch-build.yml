name: VIDA Watch — build + tests (P8)

on:
  push:
    branches: [main]
    paths:
      - "watch-ios/**"
      - "watch-android/**"
      - ".github/workflows/watch-build.yml"
  pull_request:
    paths:
      - "watch-ios/**"
      - "watch-android/**"
      - ".github/workflows/watch-build.yml"
  workflow_dispatch:

jobs:
  watchos-build:
    name: watchOS Debug (${{ matrix.size }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        size:
          - "Apple Watch Series 10 (42mm)"
          - "Apple Watch Series 10 (46mm)"
          - "Apple Watch Ultra 2 (49mm)"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: watch-ios
        run: xcodegen generate

      - name: Build VIDAWatch for simulator
        working-directory: watch-ios
        run: |
          xcodebuild \
            -project VIDAWatch.xcodeproj \
            -scheme VIDAWatch \
            -configuration Debug \
            -destination 'platform=watchOS Simulator,name=${{ matrix.size }},OS=latest' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log | xcpretty || (grep -E "error:|warning:" xcodebuild.log | head -50 && exit 1)

      - name: Run XCTest unit tests
        working-directory: watch-ios
        run: |
          xcodebuild \
            -project VIDAWatch.xcodeproj \
            -scheme VIDAWatch \
            -configuration Debug \
            -destination 'platform=watchOS Simulator,name=${{ matrix.size }},OS=latest' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee xctest.log | xcpretty --test || (grep -E "failed|error" xctest.log | head -30 && exit 1)

      - name: Upload artifact (.app)
        if: matrix.size == 'Apple Watch Series 10 (46mm)'
        uses: actions/upload-artifact@v4
        with:
          name: VIDAWatch-Debug-46mm
          path: watch-ios/build/Build/Products/Debug-watchsimulator/*.app
          retention-days: 14

  wear-build:
    name: Wear OS Debug APK + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36 platform-tools build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('watch-android/**/*.gradle*', 'watch-android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Unit tests (JUnit)
        working-directory: watch-android
        run: ./gradlew :wear:testDebugUnitTest --stacktrace

      - name: Build Wear OS debug APK
        working-directory: watch-android
        run: ./gradlew :wear:assembleDebug --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wear-test-report
          path: watch-android/wear/build/reports/tests/testDebugUnitTest
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VIDAWear-debug-apk
          path: watch-android/wear/build/outputs/apk/debug/*.apk
          retention-days: 14

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [watchos-build, wear-build]
    if: always()
    steps:
      - name: Result
        run: |
          echo "watchOS: ${{ needs.watchos-build.result }}"
          echo "Wear OS: ${{ needs.wear-build.result }}"
          if [[ "${{ needs.watchos-build.result }}" != "success" || "${{ needs.wear-build.result }}" != "success" ]]; then
            exit 1
          fi
